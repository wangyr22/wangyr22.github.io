<!DOCTYPE HTML>
<!-- Homepage - Keep it simple with just a link to your projects -->

<html lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

  <style>
    /* Center the content vertically and horizontally */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    
    .container {
      text-align: center;
    }
    
    .title {
      font-size: 2.5em;
      margin-bottom: 20px;
    }
    
    .project-link {
      font-size: 1.2em;
      padding: 15px 30px;
      margin: 10px;
      display: inline-block;
      border-radius: 5px;
      background-color: #f3f3f3;
      border: 1px solid #e7e7e7;
      transition: background-color 0.3s;
    }
    
    .project-link:hover {
      background-color: #ddd;
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- Replace "Your Name" with your actual name -->
    <h1 class="title">Yirui Wang</h1>
    
    <!-- Add a brief description or tagline if desired -->
    <p>Welcome to my research homepage (under development).</p>
    
    <!-- Link to your project pages -->
    <div>
      <!-- Add more projects by duplicating the <a> tag below -->
      <a href="ShapeGen/" class="project-link">ShapeGen Project</a>
    </div>
  </div>
</body>
